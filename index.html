<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1117">
<title>大人のしりとり辞典</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="大人のしりとり">
<style>
  :root{
    --bg:#0D1117; --card:#161B22; --card2:#1C2333; --ink:#E6EDF3; --sub:#8B949E;
    --border:#30363D;
    --a1:#4FC3F7; --a2:#7C4DFF; --a3:#00E5CC;
    --shadow:0 4px 20px rgba(0,0,0,.45);
    --glow:0 0 18px rgba(79,195,247,.18);
    --navh:0px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    margin:0; color:var(--ink); background:var(--bg);
    font-family:"Hiragino Sans","ヒラギノ角ゴ ProN","Yu Gothic","YuGothic",
                "Meiryo","Noto Sans JP",system-ui,sans-serif;
    line-height:1.6; padding-bottom:90px;
  }

  /* ヘッダー */
  header{
    background:linear-gradient(160deg, #0D1117 0%, #1a1f35 50%, #0f1a2e 100%);
    padding:28px 16px 24px; text-align:center;
    border-bottom:1px solid var(--border);
    position:relative; overflow:hidden;
  }
  header::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(ellipse 70% 60% at 50% 0%, rgba(79,195,247,.12) 0%, transparent 70%);
    pointer-events:none;
  }
  header h1{
    margin:0; font-size:28px; letter-spacing:2px; font-weight:900;
    background:linear-gradient(90deg, var(--a1), var(--a2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  header p{margin:10px 0 0; font-size:13px; color:var(--sub); letter-spacing:.5px}
  .header-badge{
    display:inline-block; margin-top:10px;
    padding:3px 12px; border-radius:999px;
    border:1px solid rgba(79,195,247,.35);
    font-size:11px; color:var(--a1); letter-spacing:1px;
  }

  /* ナビ */
  .nav{
    position:sticky; top:0; z-index:50;
    background:rgba(13,17,23,.92);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    padding:10px 10px 8px;
    border-bottom:1px solid var(--border);
  }
  .cols{display:grid; grid-template-columns:repeat(10,1fr); gap:5px}
  .col{
    border:1px solid var(--border); border-radius:10px;
    background:var(--card); color:var(--ink);
    font-size:18px; font-weight:700;
    padding:7px 0; cursor:pointer;
    transition:border-color .15s, background .15s, box-shadow .15s;
  }
  .col:active{transform:translateY(1px)}
  .col.on{
    border-color:var(--a1);
    background:rgba(79,195,247,.12);
    box-shadow:var(--glow);
  }
  .chips{
    display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; padding:0 2px;
    max-height:0; overflow:hidden; transition:max-height .25s ease;
  }
  .chips.open{max-height:90px}
  .chip{
    border:1px solid rgba(255,255,255,.2); border-radius:999px;
    font-size:16px; font-weight:700;
    padding:4px 13px; color:#fff; cursor:pointer;
    background:rgba(255,255,255,.06);
    transition:border-color .12s, background .12s;
  }
  .chip:not([disabled]):hover{background:rgba(255,255,255,.14)}
  .chip[disabled]{opacity:.3; cursor:default}

  /* 本文 */
  main{padding:6px 14px 0; max-width:680px; margin:0 auto}
  .lead{font-size:13px; color:var(--sub); text-align:center; margin:14px 4px 4px; letter-spacing:.3px}

  .group{margin-top:6px}
  .ghead{
    display:flex; align-items:center; gap:10px;
    margin:22px 0 8px; scroll-margin-top:var(--navh);
  }
  .gbadge{
    width:44px; height:44px; border-radius:50%;
    font-size:22px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    color:#fff; position:relative; flex-shrink:0;
    border:2px solid rgba(255,255,255,.15);
    box-shadow:0 0 12px rgba(0,0,0,.4);
  }
  .gline{flex:1; height:1px; background:var(--border)}

  .card{
    background:var(--card); border-radius:14px;
    padding:14px 16px; margin:8px 0;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
    border-left-width:4px;
    transition:border-color .15s;
  }
  .word{font-size:20px; font-weight:800; letter-spacing:.5px}
  .yomi{font-size:13px; color:var(--sub); font-weight:500; margin-left:6px; letter-spacing:.3px}
  .mean{
    margin-top:6px; font-size:14px; color:#C9D1D9;
    line-height:1.65; letter-spacing:.2px;
  }
  .tag{
    display:inline-block; font-size:10px; font-weight:700;
    padding:1px 7px; border-radius:999px; margin-right:4px;
    vertical-align:middle; letter-spacing:.5px;
  }

  /* トップへ */
  #toTop{
    position:fixed; right:16px; bottom:18px; z-index:60;
    border:1px solid rgba(79,195,247,.4); border-radius:999px;
    padding:11px 16px; font-size:14px; font-weight:700;
    color:var(--a1); background:rgba(13,17,23,.88);
    backdrop-filter:blur(8px);
    box-shadow:0 4px 20px rgba(79,195,247,.2); cursor:pointer;
    opacity:0; transform:translateY(20px); pointer-events:none; transition:.25s;
  }
  #toTop.show{opacity:1; transform:none; pointer-events:auto}

  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto} .chips,#toTop,.col{transition:none}
  }

  /* キャッシュ完了バナー */
  #sw-banner{
    position:fixed; top:0; left:0; right:0; z-index:999;
    background:linear-gradient(90deg,#1a3a1a,#1e4d1e);
    color:#7ee87e; font-size:13px; font-weight:700;
    text-align:center; padding:10px 16px;
    border-bottom:1px solid #4caf50;
    letter-spacing:.5px;
    transform:translateY(-100%);
    transition:transform .35s ease;
    pointer-events:none;
  }
  #sw-banner.show{ transform:translateY(0); }
</style>
</head>
<body>
<div id="sw-banner" role="status" aria-live="polite">✅ オフライン対応完了！機内モードでも使えます</div>
<header>
  <h1>大人のしりとり辞典</h1>
  <p>知れば差がつく、一目置かれる言葉たち</p>
  <span class="header-badge">ADULT EDITION</span>
</header>

<nav class="nav" aria-label="五十音ナビ">
  <div class="cols" id="cols"></div>
  <div class="chips" id="chips" aria-label="行の中の音"></div>
</nav>

<main>
  <p class="lead">行ボタンをタップして音を選ぶと、その言葉へジャンプします。</p>
  <div id="list"></div>
</main>

<button id="toTop" aria-label="トップへ戻る">▲ TOP</button>

/* ===== 五十音ナビ ===== */
const COLS = [
  ["ア","アイウエオ","#1E3A5F"],
  ["カ","カキクケコガギグゲゴ","#1A3A4A"],
  ["サ","サシスセソザジズゼゾ","#1A3A2A"],
  ["タ","タチツテトダヂヅデド","#2A3A1A"],
  ["ナ","ナニヌネノ","#3A2A1A"],
  ["ハ","ハヒフヘホバビブベボパピプペポ","#3A1A2A"],
  ["マ","マミムメモ","#2A1A3A"],
  ["ヤ","ヤユヨ","#1A2A3A"],
  ["ラ","ラリルレロ","#1A3A3A"],
  ["ワ","ワヲン","#2A2A3A"],
];

/* アクセントカラー（行ごと） */
const ACCENT_COLORS = [
  "#4FC3F7","#29B6F6","#26C6DA","#26A69A",
  "#66BB6A","#9CCC65","#AB47BC","#7E57C2",
  "#42A5F5","#26C6DA"
];

/* 五十音順序（ひらがな） */
const ORDER = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";

/* カタカナ→ひらがな変換 */
const toHira = s => s.replace(/[ァ-ン]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));

/* 濁点・小書き正規化 */
const BASE_H = {
  "が":"か","ぎ":"き","ぐ":"く","げ":"け","ご":"こ",
  "ざ":"さ","じ":"し","ず":"す","ぜ":"せ","ぞ":"そ",
  "だ":"た","ぢ":"ち","づ":"つ","で":"て","ど":"と",
  "ば":"は","び":"ひ","ぶ":"ふ","べ":"へ","ぼ":"ほ",
  "ぱ":"は","ぴ":"ひ","ぷ":"ふ","ぺ":"へ","ぽ":"ほ",
  "ぁ":"あ","ぃ":"い","ぅ":"う","ぇ":"え","ぉ":"お",
  "っ":"つ","ゃ":"や","ゅ":"ゆ","ょ":"よ","ゎ":"わ"
};
const baseH = c => BASE_H[c] || c;
const gi = c => { const i = ORDER.indexOf(baseH(c)); return i < 0 ? 999 : i; };

function cmp(a, b) {
  const ah = toHira(a), bh = toHira(b);
  const n = Math.min(ah.length, bh.length);
  for (let i = 0; i < n; i++) {
    const d = gi(ah[i]) - gi(bh[i]);
    if (d) return d;
    if (ah[i] !== bh[i]) return ah.charCodeAt(i) - bh.charCodeAt(i);
  }
  return ah.length - bh.length;
}

/* よみがなの最初の「行（ひらがな清音）」を返す */
function rowKey(yomi) {
  const h = toHira(yomi);
  return baseH(h[0]);
}

/* データ整備 */
const words = RAW.map(([w, y, m]) => ({ w, y, m })).sort((a, b) => cmp(a.y, b.y));
const groups = {};
for (const it of words) {
  const key = rowKey(it.y);
  (groups[key] ||= []).push(it);
}

/* 行→アクセントカラー */
const colorOfRow = {};
COLS.forEach(([, sounds], idx) => {
  const hSounds = toHira(sounds);
  for (const s of hSounds) colorOfRow[s] = ACCENT_COLORS[idx];
});

/* ===== DOM構築 ===== */
const listEl = document.getElementById("list");
let html = "";
for (const ch of ORDER) {
  const arr = groups[ch];
  if (!arr) continue;
  const color = colorOfRow[ch] || "#4FC3F7";
  const katakana = String.fromCharCode(ch.charCodeAt(0) + 0x60);
  html += `<section class="group">
    <div class="ghead" id="g-${ch}">
      <span class="gbadge" style="background:linear-gradient(135deg,${color}33,${color}66);border-color:${color}55;color:${color}">${katakana}</span>
      <span class="gline"></span>
    </div>`;
  for (const it of arr) {
    html += `<article class="card" style="border-left-color:${color}">
      <div><span class="word">${it.w}</span><span class="yomi">（${it.y}）</span></div>
      <div class="mean">${it.m}</div>
    </article>`;
  }
  html += `</section>`;
}
listEl.innerHTML = html;

/* ===== ナビボタン ===== */
const colsEl = document.getElementById("cols");
const chipsEl = document.getElementById("chips");
let openCol = -1;

COLS.forEach(([head, sounds], idx) => {
  const b = document.createElement("button");
  b.className = "col";
  b.textContent = head;
  b.style.borderColor = ACCENT_COLORS[idx] + "66";
  b.style.color = ACCENT_COLORS[idx];
  b.onclick = () => toggleCol(idx);
  colsEl.appendChild(b);
});

function toggleCol(idx) {
  [...colsEl.children].forEach((b, i) => b.classList.toggle("on", i === idx && openCol !== idx));
  if (openCol === idx) { chipsEl.classList.remove("open"); openCol = -1; setNavH(); return; }
  openCol = idx;
  const [, sounds] = COLS[idx];
  const hSounds = toHira(sounds);
  chipsEl.innerHTML = "";
  for (const s of hSounds) {
    const c = document.createElement("button");
    c.className = "chip";
    const katakana = String.fromCharCode(s.charCodeAt(0) + 0x60);
    c.textContent = katakana;
    c.style.borderColor = ACCENT_COLORS[idx] + "88";
    c.style.color = ACCENT_COLORS[idx];
    if (groups[s]) c.onclick = () => jumpTo(s);
    else c.disabled = true;
    chipsEl.appendChild(c);
  }
  chipsEl.classList.add("open");
  setNavH();
}

const navEl = document.querySelector(".nav");
function setNavH() {
  document.documentElement.style.setProperty("--navh", (navEl.offsetHeight + 10) + "px");
}
function jumpTo(ch) {
  const t = document.getElementById("g-" + ch);
  if (!t) return;
  const y = t.getBoundingClientRect().top + window.pageYOffset - navEl.offsetHeight - 10;
  window.scrollTo({ top: y, behavior: "smooth" });
}

const toTop = document.getElementById("toTop");
toTop.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
addEventListener("scroll", () => toTop.classList.toggle("show", scrollY > 400), { passive: true });
addEventListener("resize", setNavH);
setNavH();

/* PWA Service Worker登録 */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js")
      .then((reg) => console.log("[SW] 登録成功:", reg.scope))
      .catch((err) => console.warn("[SW] 登録失敗:", err));

    /* SW からのメッセージを受け取ってバナー表示 */
    navigator.serviceWorker.addEventListener("message", (e) => {
      if (e.data && e.data.type === "SW_CACHED") {
        const banner = document.getElementById("sw-banner");
        if (!banner) return;
        banner.classList.add("show");
        setTimeout(() => banner.classList.remove("show"), 4000);
      }
    });
  });
}
</script>
